<div class="tour-detail-grid">
  <div>
    <strong>Description:</strong>
    <p>{{ tour.description }}</p>
  </div>

  <div>
    <strong>From:</strong>
    <p>{{ tour.from }}</p>
  </div>

  <div>
    <strong>To:</strong>
    <p>{{ tour.to }}</p>
  </div>

  <div>
    <strong>Transport:</strong>
    <p>{{ tour.transportType }}</p>
  </div>

  <div>
    <strong>Distance:</strong>
    <p>{{ tour.distance }} km</p>
  </div>

  <div>
    <strong>Estimated Time:</strong>
    <p>{{ tour.estimatedTime }}</p>
  </div>

  <div>
    <strong>Popularity:</strong>
    <p>{{ popularity }}</p>
  </div>
</div>
