<div class="card" (click)="openTour()">
  <div class="title-row">
    <h3>{{ tour.name }}</h3>

    <div class="title-actions">
      <button
        class="favorite-button"
        [class.favorited]="tour.favorite"
        matIconButton
        (click)="toggleFavorite($event)">
        <mat-icon>{{ tour.favorite ? 'favorite' : 'favorite_border' }}</mat-icon>
      </button>

      <button class="transport-chip" matMiniFab [ngClass]="tour.transportType">
        <mat-icon iconPositionEnd>{{ getTransportIcon(tour.transportType) }}</mat-icon>
      </button>
    </div>

  </div>
  <p>{{ tour.description }}</p>
</div>
