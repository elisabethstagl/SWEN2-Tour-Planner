<section class="discover">
  <h2>{{ title }}</h2>
  <div class="container">
    @for (tour of tours; track tour.id) {
      <!--
      <app-card [tour]="tour"></app-card>
      -->
        <div class="card">
          <h3>{{tour.title}}</h3>
          <p>{{tour.description}}</p>
          <div class="info">
            <span><span class="label">From:</span> {{tour.from}}</span>
            <span><span class="label">To:</span> {{tour.to}}</span>
            <span><span class="label">Distance:</span> {{tour.distance}} km</span>
            <span><span class="label">Duration:</span> {{tour.duration}}</span>
          </div>
        </div>
    } @empty {
      <p>No tours available.</p>
    }
  </div>
</section>
