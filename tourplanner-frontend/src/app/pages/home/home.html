<div class="landing-page">
  <div class="landing-card">

    <img src="assets/map.png"
         alt="Logo"
         class="logo" />

    <h1>RouteMate</h1>

    <p class="subtitle">
      Plan, organize and manage your tours in one place.
    </p>

    <p class="info-text">
      Please log in or create an account to start planning your routes.

    <div class="actions">

      </button>

      <button

        routerLink="/register">

      </button>
    </div>

  </div>
</div>
