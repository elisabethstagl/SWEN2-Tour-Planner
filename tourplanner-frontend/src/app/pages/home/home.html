<div class="home-layout">

  <!-- left section -->
  <div class="list">

    <!-- headline and filter icon -->
    <div class="list-header">
      <h2>Public Tours</h2>

<!--      <button mat-icon-button aria-label="Filter">-->
<!--        <mat-icon>filter_list</mat-icon>-->
<!--      </button>-->

      <button class="filter-button" matFab extended>
        Filter
        <mat-icon iconPositionEnd >filter_list</mat-icon>
      </button>
    </div>

    <!-- Tour list -->
    @for (tour of tours; track tour.id) {
      <app-tour-list-item [tour]="tour"></app-tour-list-item>
    } @empty {
      <p>No tours available.</p>
    }

  </div>

  <!-- right section -->
  <div class="map-div">
    <img src="/assets/map.png" alt="Map">
  </div>

</div>
