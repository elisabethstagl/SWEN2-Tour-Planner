# Credentials are intentionally NOT set here.
# Flyway automatically picks up FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD from the environment,
# which override any value in this file. Export them from .env before running the Maven plugin, e.g.:
#   export $(grep -v '^#' .env | xargs) && \
#   export FLYWAY_URL="jdbc:postgresql://$DB_HOST:$DB_PORT/$DB_NAME" FLYWAY_USER=$DB_USERNAME FLYWAY_PASSWORD=$DB_PASSWORD && \
#   ./mvnw flyway:migrate
flyway.locations=filesystem:./src/main/resources/db/migration